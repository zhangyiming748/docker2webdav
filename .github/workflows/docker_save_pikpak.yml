# 工作流名称：将 Docker 镜像备份到 PikPak WebDAV
name: Docker Image Backup to Pikpak WebDAV

# 触发条件：当推送到 webdav 分支或手动触发时执行
on:
  push:
    branches: [ pikpak ]
  workflow_dispatch:

jobs:
  backup-docker-images:
    # 在最新版本的 Ubuntu 运行器上执行
    runs-on: ubuntu-latest
    
    steps:
    # 步骤 1：检出代码仓库，获取 images.txt 文件
    - name: Checkout repository
      uses: actions/checkout@v6

    # 步骤 2：设置 Docker Buildx，用于后续的 Docker 操作
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # 步骤 3：安装 curl 工具,用于后续通过 HTTP 协议上传文件到 WebDAV
    - name: Install WebDAV client (curl)
      run: |
        sudo apt-get update
        sudo apt-get install -y curl
    
    # 步骤 3.5：调试 - 打印 WebDAV 配置
    - name: Debug - Print WebDAV Configuration
      run: |
        echo "=== WebDAV Configuration ==="
        echo "WEBDAV_URL: https://dav.mypikpak.com/images"
        echo "Username: syyy"
        echo "Password length: ${#WEBDAV_PWD}"
        echo "Authentication method: Basic Auth (Hardcoded)"
        echo "==========================="

    # 步骤 3.6：测试 WebDAV 连接
    - name: Test WebDAV Connection
      run: |
        echo "Testing WebDAV connection with Basic Auth..."
        test_code=$(curl -X PROPFIND \
          -u "syyy:xdmjdeia" \
          -H "Content-Type: application/xml" \
          -d '<?xml version="1.0" encoding="utf-8"?><D:propfind xmlns:D="DAV:"><D:prop><D:displayname/></D:prop></D:propfind>' \
          -w "%{http_code}" \
          -o /dev/null \
          -s \
          --max-time 30 \
          "https://dav.mypikpak.com/images/")
        
        echo "WebDAV Test Response Code: $test_code"
        
        if [ "$test_code" = "207" ] || [ "$test_code" = "200" ]; then
          echo "✅ WebDAV connection successful!"
        elif [ "$test_code" = "401" ]; then
          echo "❌ Authentication failed (401). Username or password is incorrect!"
          exit 1
        elif [ "$test_code" = "404" ]; then
          echo "⚠️  Path not found (404). The directory might not exist yet."
        else
          echo "⚠️  Unexpected response code: $test_code"
        fi

    # 步骤 4：遍历 images.txt 中的每一行，处理对应的 Docker 镜像
    - name: Process each Docker image
      run: |
        echo "=== Starting Docker Image Backup Process ==="
        echo "Reading images from images.txt..."
        
        # 检查 images.txt 是否存在
        if [ ! -f "images.txt" ]; then
          echo "Error: images.txt file not found!"
          exit 1
        fi
        
        # 显示文件内容
        echo "Contents of images.txt:"
        cat images.txt
        echo "---"
        
        # 计数器
        count=0
        success=0
        failed=0
        
        while IFS= read -r image || [ -n "$image" ]; do
          # 跳过空行和以 # 开头的注释行
          if [[ -z "$image" || "$image" =~ ^[[:space:]]*#.*$ || "$image" =~ ^[[:space:]]*$ ]]; then
            echo "Skipping empty line or comment: '$image'"
            continue
          fi
          
          count=$((count + 1))
          echo ""
          echo "=== Processing image $count: $image ==="
          
          # 如果镜像名没有指定标签，则默认添加 :latest 标签
          if [[ ! "$image" =~ : ]]; then
            image="${image}:latest"
            echo "Added default tag: $image"
          fi
          
          # 将镜像名中的特殊字符替换为下划线，生成安全的文件名
          filename=$(echo "$image" | sed 's/[\/:*?"<>|]/_/g').tar
          echo "Filename will be: $filename"
          
          # 从 Docker Hub 拉取指定的镜像
          echo "Pulling image: $image"
          if ! docker pull "$image"; then
            echo "❌ Error: Failed to pull image $image. Skipping..."
            failed=$((failed + 1))
            continue
          fi
          echo "✅ Successfully pulled: $image"
          
          # 将 Docker 镜像保存为 tar 归档文件
          echo "Saving image to: $filename"
          if ! docker save -o "$filename" "$image"; then
            echo "❌ Error: Failed to save image $image. Skipping..."
            failed=$((failed + 1))
            continue
          fi
          echo "✅ Successfully saved: $filename"
          
          # 显示文件大小
          filesize=$(du -h "$filename" | cut -f1)
          echo "File size: $filesize"
          
          # 使用 curl 将 tar 文件上传到 WebDAV 服务器
          echo "Uploading $filename to https://dav.mypikpak.com/images/$filename"
          upload_result=0
          http_code=$(curl -T "$filename" \
            -u "syyy:xdmjdeia" \
            -H "Expect:" \
            --max-time 3600 \
            --retry 3 \
            --retry-delay 5 \
            -w "%{http_code}" \
            -o /dev/null \
            -s \
            "https://dav.mypikpak.com/images/$filename") || upload_result=$?
          
          echo "HTTP Response Code: $http_code"
          
          if [ $upload_result -eq 0 ] && ([ "$http_code" = "200" ] || [ "$http_code" = "201" ] || [ "$http_code" = "204" ]); then
            echo "✅ Successfully uploaded: $filename (HTTP $http_code)"
            success=$((success + 1))
          else
            echo "❌ Error: Failed to upload $filename (curl exit code: $upload_result, HTTP code: $http_code)"
            failed=$((failed + 1))
          fi
          
          # 清理本地文件：删除生成的 tar 文件和已拉取的 Docker 镜像以释放空间
          echo "Cleaning up..."
          rm -f "$filename"
          docker rmi "$image" || true
          
          echo "=== Completed processing: $image ==="
          echo ""
        done < images.txt
        
        echo ""
        echo "========================================"
        echo "=== Backup Process Summary ==="
        echo "Total images processed: $count"
        echo "Successful: $success"
        echo "Failed: $failed"
        echo "========================================"
        
        if [ $failed -gt 0 ]; then
          echo "⚠️  Some images failed to process. Check logs above."
          exit 1
        else
          echo "✅ All images processed successfully!"
        fi
